[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  AUTH_TRUST_HOST = "true"
  # This makes Auth.js trust the host on Netlify
  NEXTAUTH_URL = "https://airesumecareer.netlify.app"
  AUTH_URL = "https://airesumecareer.netlify.app"
  
  # For Auth.js v5 beta in production, AUTH_SECRET must be present in process.env
  AUTH_SECRET = "ai-career-navigator-super-secret-key-2024"
